services:
  frontend:
    image: thuan410/nt114-microservice-fe:latest
    container_name: nt114-microservices-fe-frontend-1
    restart: unless-stopped
    networks:
      - shared-network

  nginx:
    image: nginx:alpine
    container_name: nt114-microservices-fe-nginx-1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      - ./ssl/private.key:/etc/nginx/ssl/private.key:ro
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - shared-network

networks:
  shared-network:
    external: true